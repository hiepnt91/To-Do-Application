version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:stable # Sử dụng image của CircleCI để ổn định hơn
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true # Tăng tốc build cho các lần sau
      - run:
          name: Build and push Docker image
          command: |
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker build -t $DOCKERHUB_USERNAME/todo_app:v1.0.${CIRCLE_BUILD_NUM} .
            docker build -t $DOCKERHUB_USERNAME/todo_app:latest .
            docker push $DOCKERHUB_USERNAME/todo_app --all-tags

  deploy:
    docker:
      - image: google/cloud-sdk
    steps:
      - checkout
      - run:
          name: Configure gcloud and Deploy
          command: |
            echo $GCLOUD_SERVICE_KEY > key.json
            gcloud auth activate-service-account --key-file=key.json
            gcloud container clusters get-credentials whizlabs-cluster --zone us-central1-a --project $GCLOUD_PROJECT_ID
            kubectl apply -f Deployment.yaml

workflows:
  build-and-deploy:
    jobs:
      - build:
          context: my-context
      - deploy:
          context: my-context
          requires:
            - build # Đảm bảo deploy chỉ chạy khi build thành công
          filters:
            branches:
              only: main # Chỉ deploy khi code được merge vào nhánh main
